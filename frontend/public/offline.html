<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DAFREQ sin conexión</title>
    <meta name="theme-color" content="#020617" />
    <style>
      :root {
        color-scheme: light;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background:
          radial-gradient(circle at top, rgba(59, 130, 246, 0.2), transparent 30%),
          linear-gradient(180deg, #020617 0%, #0f172a 100%);
        color: #e2e8f0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .card {
        width: min(100%, 560px);
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.12);
        padding: 32px 28px;
        backdrop-filter: blur(10px);
        box-shadow: 0 30px 80px rgba(2, 6, 23, 0.35);
      }
      .logo {
        width: 84px;
        height: 84px;
        object-fit: contain;
      }
      .eyebrow {
        margin: 20px 0 0;
        color: #93c5fd;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.32em;
        text-transform: uppercase;
      }
      h1 {
        margin: 14px 0 0;
        font-size: clamp(28px, 5vw, 40px);
        line-height: 1.1;
      }
      p {
        margin: 14px 0 0;
        color: #cbd5e1;
        font-size: 15px;
        line-height: 1.6;
      }
      .actions {
        margin-top: 24px;
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }
      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 0 18px;
        border-radius: 14px;
        background: #2563eb;
        color: white;
        font-weight: 600;
        text-decoration: none;
      }
      .ghost {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.12);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <img class="logo" src="/logo-dafreq.png" alt="DAFREQ Transport" />
      <p class="eyebrow">Modo offline</p>
      <h1>Sin conexión</h1>
      <p>Puedes consultar contenido previamente cargado, pero las operaciones requieren internet.</p>
      <p>Cuando la conexión vuelva, DAFREQ retomará el flujo normal.</p>
      <div class="actions">
        <a class="button" href="/">Intentar de nuevo</a>
        <a class="button ghost" href="/login">Ir a acceso</a>
      </div>
    </main>
  </body>
</html>
