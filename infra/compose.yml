services:
  db:
    image: postgres:16
    container_name: logistica_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # PostgreSQL queda solo en la red interna de Docker.
    # No se publica al host ni a internet.
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: ../backend
    container_name: logistica_api
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PYTHONPATH: /app
    # FastAPI se expone únicamente en localhost para que NGINX
    # sea el único punto de entrada público al stack.
    ports:
      - "127.0.0.1:8080:8000"
    depends_on:
      - db
    volumes:
      - ../backend:/app
    env_file:
      - .env

volumes:
  pgdata:
